<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">

<defs>
<linearGradient id="acid" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#39ff14"></stop>
<stop offset="25%" stop-color="#ff00ff"></stop>
<stop offset="50%" stop-color="#00f7ff"></stop>
<stop offset="75%" stop-color="#ff003c"></stop>
<stop offset="100%" stop-color="#fff700"></stop>
</linearGradient>
</defs>

<rect width="120" height="120" rx="20" fill="#000"></rect>

<!-- temple -->
<g fill="url(#acid)">

<!-- roof -->
<polygon points="24,50 60,26 96,50"></polygon>

<!-- roof thickness -->
<rect x="26" y="50" width="68" height="5"></rect>

<!-- frieze -->
<rect x="28" y="55" width="64" height="4"></rect>

<!-- columns -->
<rect x="34" y="59" width="6" height="22"></rect>
<rect x="46" y="59" width="6" height="22"></rect>
<rect x="58" y="59" width="6" height="22"></rect>
<rect x="70" y="59" width="6" height="22"></rect>
<rect x="82" y="59" width="6" height="22"></rect>

<!-- base -->
<rect x="22" y="81" width="76" height="9"></rect>

</g>

<!-- fracture -->
<path d="
M60 26
L54 44
L66 50
L46 66
L70 72
L50 92
L60 108
" stroke="#ffffff" stroke-width="3" fill="none" stroke-linejoin="miter"></path>

</svg>